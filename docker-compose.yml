services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-postgres
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: hospital
      POSTGRES_PASSWORD: hospital
    ports:
      - "5433:5432"
    volumes:
      - hospital-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital -d hospital"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hospital-postgres-data:
